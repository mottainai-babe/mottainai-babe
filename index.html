<style>
:root{
  --bg:#377649;
  --white:#ffffff;
  --white-80: rgba(255,255,255,.8);
  --white-65: rgba(255,255,255,.65);
  --pill: rgba(255,255,255,.12);
  --stroke: rgba(255,255,255,.55);

  --modalBack: rgba(0,0,0,.55);
  --modalCard: #ffffff;
  --modalText: #111827;
  --modalMuted: #6b7280;
  --modalLine: #e5e7eb;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--white);
  font-family: ui-sans-serif, system-ui, -apple-system, "Hiragino Sans","Noto Sans JP", Arial;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.wrap{
  width:min(980px,92vw);
  padding:48px 70px;
}

.center{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:18px;
}

.logo{
  width:min(520px,78vw);
  height:auto;
}

.jp-title{
  font-size:18px;
  font-weight:700;
}

.jp-sub{
  font-size:14px;
  color:var(--white-80);
}

.btns{
  display:flex;
  flex-direction:column;
  gap:12px;
  width:min(520px,78vw);
}

.btn{
  height:58px;
  border-radius:999px;
  font-size:16px;
  font-weight:700;
  border:1px solid var(--stroke);
  background:transparent;
  color:var(--white);
  cursor:pointer;
}

.btn.primary{
  background:rgba(255,255,255,.85);
  border-color:rgba(255,255,255,.85);
  color:#1f3d2b;
}

.badges{
  margin-top:14px;
  display:flex;
  gap:14px;
  justify-content:center;
}

.badge{
  padding:10px 16px;
  border-radius:999px;
  background:var(--pill);
  border:1px solid rgba(255,255,255,.12);
  font-size:13px;
  color:var(--white-80);
  font-weight:700;
}

/* ===== Guide Section ===== */

.infoSection{
  width:100%;
  margin-top:48px;
  padding-top:34px;
  border-top:1px solid rgba(255,255,255,.14); /* 구분선 */
  text-align:center;
}

.infoInner{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center; /* 완전 중앙 */
  gap:14px;
}

.infoTitle{
  font-size:18px;
  font-weight:800;
}

.infoDesc{
  max-width:52ch;
  font-size:13px;
  line-height:1.7;
  color:var(--white-80);
}

.infoBtn{
  display:block;
  width:100%;
  max-width:520px;
  padding:14px 18px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.45);
  background:rgba(255,255,255,.12);
  color:#fff;
  text-decoration:none;
  font-weight:800;
  text-align:center;
  transition:background .2s ease;
}

.infoBtn:hover{
  background:rgba(255,255,255,.18);
}

/* ===== Footer ===== */

.footer{
  margin-top:30px;
  padding-top:18px;
  border-top:1px solid rgba(255,255,255,.14);
  font-size:12px;
  color:var(--white-65);
  text-align:center;
  line-height:1.6;
}

.footer a{
  color:var(--white-80);
  text-decoration:none;
}

.footer a:hover{
  text-decoration:underline;
}

@media (max-width:520px){
  .wrap{padding:34px 20px}
  .btn{height:54px}
}
</style>
</head>

<body>
<main class="wrap">

<section class="center">
  <img class="logo" src="./logo1.png" alt="Mottainai Babe" />
  <div class="jp-title">もったいないベビー</div>
  <div class="jp-sub">ベビー用品交換プラットフォーム</div>

  <div class="btns">
    <button id="btnPost" class="btn primary">出品する</button>
    <button id="btnView" class="btn">アイテムを見る</button>
  </div>

  <div class="badges">
    <div class="badge">簡単出品</div>
    <div class="badge">安心交換</div>
    <div class="badge">利用無料</div>
  </div>
</section>

<!-- Guide Section -->
<section class="infoSection">
  <div class="infoInner">
    <div class="infoTitle">子育てとリユース情報</div>
    <div class="infoDesc">
      安全・エコ・リユースのヒントをガイドにまとめました。<br>
      まずはガイド一覧からチェックできます。
    </div>
    <a class="infoBtn" href="./guide.html">ガイドを読む →</a>
  </div>
</section>

<footer class="footer">
  <div>Mottainai Babeは、ベビー用品を必要な人へつなぐ交換プラットフォームです。</div>
  <div>
    <a href="./guide.html">ガイド</a> |

    <a href="./privacy.html">プライバシーポリシー</a> |
    <a href="./about.html">お問い合わせ</a>
  </div>
  <div>© 2026 Mottainai Babe. All rights reserved.</div>
</footer>

</main>
</body>
</html>
