<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ガイド | Mottainai Babe</title>
  <meta name="description" content="Mottainai Babeのガイド一覧。安全、エコ、リユースの基本をわかりやすくまとめています。" />

  <!-- AdSense (site ownership / Auto ads) -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5865479939175622"
    crossorigin="anonymous"></script>

  <style>
    :root{
      /* ✅ index.html と同じブランド色 */
      --bg:#377649;
      --bg-dark:#2e633d;
      --bg-darker:#1f4b2e;

      --paper:#ffffff;
      --soft:#f3f4f6;

      --ink:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;

      --white:#ffffff;
      --white-80: rgba(255,255,255,.85);
      --white-65: rgba(255,255,255,.65);

      --radius:20px;
      --shadow: 0 18px 40px rgba(0,0,0,.12);
      --w: 940px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", "Segoe UI", Roboto, Arial;
      color:var(--ink);
      background:
        radial-gradient(1200px 600px at 20% 0%, rgba(255,255,255,.08), transparent 55%),
        radial-gradient(900px 500px at 100% 10%, rgba(0,0,0,.12), transparent 55%),
        linear-gradient(180deg, var(--bg-darker) 0%, var(--bg) 46%, var(--soft) 46%, var(--soft) 100%);
      min-height:100vh;
    }
    a{color:inherit;text-decoration:none}

    /* ===== Topbar ===== */
    .topbar{
      position:sticky; top:0;
      z-index:50;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(55,118,73,.66);
      border-bottom: 1px solid rgba(255,255,255,.16);
    }
    .topbar .inner{
      max-width: var(--w);
      margin: 0 auto;
      padding: 12px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width: 220px;
    }
    .brandMark{
      width:40px;height:40px;
      border-radius: 14px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.18);
      display:grid;
      place-items:center;
      overflow:hidden;
      box-shadow: 0 10px 22px rgba(0,0,0,.12);
    }
    .brandMark img{
      width:34px;height:34px;
      object-fit:contain;
      display:block;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.18));
    }
    .brandText{
      display:flex;
      flex-direction:column;
      line-height:1.1;
      color:#fff;
    }
    .brandText strong{font-size:15px; letter-spacing:.2px}
    .brandText span{
      font-size:12px;
      color: var(--white-80);
    }

    .nav{
      display:flex;
      align-items:center;
      gap:6px;
    }
    .nav a{
      color:#fff;
      font-size:13px;
      padding:9px 12px;
      border-radius:999px;
      border:1px solid transparent;
      opacity:.92;
      white-space:nowrap;
    }
    .nav a:hover{
      background: rgba(255,255,255,.10);
      border-color: rgba(255,255,255,.14);
      opacity:1;
    }

    /* ===== Layout ===== */
    .wrap{
      max-width: var(--w);
      margin: 0 auto;
      padding: 26px 18px 56px;
    }
    .hero{
      color:#fff;
      padding: 16px 0 14px;
    }
    .kicker{
      display:inline-flex;
      gap:8px; align-items:center;
      font-size:12px;
      color: var(--white-80);
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.16);
      padding: 7px 12px;
      border-radius: 999px;
    }
    h1{
      margin: 14px 0 10px;
      font-size: 32px;
      line-height: 1.15;
      letter-spacing: -.4px;
    }
    .lead{
      margin:0;
      max-width: 72ch;
      color: var(--white-80);
      line-height:1.75;
    }

    /* ===== Cards ===== */
    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:16px;
      margin-top: 18px;
    }
    @media (max-width: 900px){ .grid{grid-template-columns:1fr} }

    .card{
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(255,255,255,.70);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      position:relative;
    }
    .card::before{
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(600px 240px at 20% 0%, rgba(55,118,73,.14), transparent 50%),
        radial-gradient(420px 220px at 110% 10%, rgba(0,0,0,.06), transparent 55%);
      pointer-events:none;
    }
    .card > *{position:relative}

    .card .hd{
      padding: 16px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      border-bottom: 1px solid rgba(17,24,39,.08);
      background: linear-gradient(180deg, rgba(255,255,255,.92) 0%, rgba(255,255,255,.78) 100%);
    }
    .card .hd h2{margin:0;font-size:16px}
    .pill{
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      background: rgba(55,118,73,.12);
      color: var(--bg-darker);
      border: 1px solid rgba(55,118,73,.18);
      white-space:nowrap;
    }
    .card .bd{
      padding: 16px 18px;
      line-height:1.85;
      color: rgba(17,24,39,.92);
    }
    .actions{
      margin-top:auto;
      padding: 14px 18px 18px;
      display:flex;
      justify-content:flex-end;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding: 10px 16px;
      border-radius:999px;
      border:none;
      background: var(--bg);
      color:#fff;
      font-weight:600;
      letter-spacing:.1px;
      box-shadow: 0 10px 18px rgba(55,118,73,.22);
      transition: .2s ease;
    }
    .btn:hover{
      background: var(--bg-dark);
      transform: translateY(-1px);
    }

    /* ===== Footer ===== */
    .footer{
      margin-top: 18px;
      text-align:center;
      font-size: 12px;
      color: rgba(17,24,39,.80);
    }
    .footer .links{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin: 10px 0 0;
    }
    .footer .links a{
      color: rgba(17,24,39,.78);
      padding: 6px 8px;
      border-radius: 10px;
    }
    .footer .links a:hover{
      background: rgba(55,118,73,.10);
      color: rgba(17,24,39,.92);
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="inner">
      <a class="brand" href="./index.html" aria-label="Mottainai Babe トップへ">
        <span class="brandMark" aria-hidden="true">
          <img src="./logo1.png" alt="" />
        </span>
        <span class="brandText">
          <strong>Mottainai Babe</strong>
          <span>リユースでつなぐ、やさしい循環</span>
        </span>
      </a>

      <nav class="nav" aria-label="ナビゲーション">
        <a href="./app.html">アプリ</a>
        <a href="./about.html">お問い合わせ</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <span class="kicker">Guides • 読みもの</span>
      <h1>ガイド一覧</h1>
      <p class="lead">
        安全に、気持ちよく、長く使うためのヒントをまとめました。
      </p>
    </section>

    <section class="grid" aria-label="ガイドカード">
      <article class="card">
        <div class="hd">
          <h2>安全ガイド</h2>
          <span class="pill">Safety</span>
        </div>
        <div class="bd">
          リユースでも「安全が最優先」。危険サイン、受け渡し時の確認、カテゴリ別の注意点を整理しています。
        </div>
        <div class="actions">
          <a class="btn" href="./safety.html" aria-label="安全ガイドを読む">読む →</a>
        </div>
      </article>

      <article class="card">
        <div class="hd">
          <h2>エコの考え方</h2>
          <span class="pill">Eco</span>
        </div>
        <div class="bd">
          “捨てない”選択が、家計にも地球にもやさしい。循環を作るコツと、やさしい取引マナーをまとめました。
        </div>
        <div class="actions">
          <a class="btn" href="./eco.html" aria-label="エコの考え方を読む">読む →</a>
        </div>
      </article>
    </section>

    <footer class="footer">
      <div>© 2026 Mottainai Babe. All rights reserved.</div>
      <div class="links">
        <a href="./terms.html">利用規約</a>
        <a href="./privacy.html">プライバシーポリシー</a>
        <a href="./about.html">お問い合わせ</a>
      </div>
    </footer>
  </main>
</body>
</html>
