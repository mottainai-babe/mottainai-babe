<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ガイド | Mottainai Babe</title>
  <meta name="description" content="Mottainai Babeのガイド一覧。安全、エコ、リユースの基本をわかりやすくまとめています。" />

  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5865479939175622"
    crossorigin="anonymous"></script>

  <style>
    :root{
      --bg:#0f3b34;
      --paper:#ffffff;
      --ink:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --soft:#f5f7f7;
      --accent:#16a34a;
      --radius:18px;
      --shadow: 0 10px 30px rgba(0,0,0,.10);
      --w: 820px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", "Segoe UI", Roboto, Arial;
      color:var(--ink);
      background:
        radial-gradient(1200px 600px at 20% 0%, rgba(22,163,74,.22), transparent 55%),
        radial-gradient(900px 500px at 100% 10%, rgba(245,158,11,.18), transparent 55%),
        linear-gradient(180deg, #0b2c27 0%, #0f3b34 38%, #f3f4f6 38%, #f3f4f6 100%);
      min-height:100vh;
    }
    a{color:inherit;text-decoration:none}
    .topbar{
      position:sticky; top:0;
      backdrop-filter: blur(10px);
      background: rgba(15,59,52,.72);
      border-bottom: 1px solid rgba(255,255,255,.10);
      z-index:10;
    }
    .topbar .inner{
      max-width: var(--w);
      margin: 0 auto;
      padding: 14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      color:#fff;
    }
    .brand{
      display:flex; align-items:center; gap:10px;
    }
    .dot{
      width:10px;height:10px;border-radius:50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(22,163,74,.18);
    }
    .nav a{
      opacity:.9;
      padding:8px 10px;
      border-radius:999px;
    }
    .nav a:hover{background: rgba(255,255,255,.10)}
    .wrap{
      max-width: var(--w);
      margin: 0 auto;
      padding: 26px 18px 56px;
    }
    .hero{color:#fff;padding: 18px 0 12px}
    .kicker{
      display:inline-flex;
      gap:8px; align-items:center;
      font-size:12px;
      opacity:.92;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.16);
      padding: 6px 10px;
      border-radius: 999px;
    }
    h1{
      margin: 14px 0 10px;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: -.3px;
    }
    .lead{
      margin:0;
      max-width: 70ch;
      color: rgba(255,255,255,.88);
      line-height:1.7;
    }
    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:16px;
      margin-top: 18px;
    }
    @media (max-width: 860px){ .grid{grid-template-columns:1fr} }
    .card{
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .card .hd{
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fafafa 100%);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .card .hd h2{margin:0;font-size:16px}
    .pill{
      font-size:12px;
      color: var(--muted);
      padding: 6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background: #fff;
      white-space: nowrap;
    }
    .card .bd{padding: 16px 18px;line-height:1.8;color:rgba(17,24,39,.92)}
    .actions{
      margin-top:auto;
      padding: 14px 18px 18px;
      display:flex;
      justify-content:flex-end;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 10px 14px;
      border-radius:999px;
      border:1px solid var(--line);
      background: var(--soft);
      color: var(--ink);
    }
    .btn:hover{filter:brightness(.98)}
    .footer{
      margin-top: 18px;
      color: rgba(17,24,39,.88);
      text-align:center;
      font-size: 12px;
      opacity:.95;
    }
    .footer .links{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin: 10px 0 0;
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="inner">
      <a class="brand" href="./index.html">
        <span class="dot"></span>
        <strong>Mottainai Babe</strong>
      </a>
      <nav class="nav">
        <a href="./app.html">アプリ</a>
        <a href="./about.html">お問い合わせ</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <span class="kicker">Guides • 読みもの</span>
      <h1>ガイド一覧</h1>
      <p class="lead">
        安全に、気持ちよく、長く使うためのヒントをまとめました。
      </p>
    </section>

    <section class="grid">
      <article class="card">
        <div class="hd">
          <h2>安全ガイド</h2>
          <span class="pill">Safety</span>
        </div>
        <div class="bd">
          リユースでも「安全が最優先」。危険サイン、受け渡し時の確認、カテゴリ別の注意点を整理しています。
        </div>
        <div class="actions">
          <a class="btn" href="./safety.html">読む →</a>
        </div>
      </article>

      <article class="card">
        <div class="hd">
          <h2>エコの考え方</h2>
          <span class="pill">Eco</span>
        </div>
        <div class="bd">
          “捨てない”選択が、家計にも地球にもやさしい。循環を作るコツと、やさしい取引マナーをまとめました。
        </div>
        <div class="actions">
          <a class="btn" href="./eco.html">読む →</a>
        </div>
      </article>
    </section>

    <footer class="footer">
      <div>© 2026 Mottainai Babe. All rights reserved.</div>
      <div class="links">
        <a href="./terms.html">利用規約</a>
        <a href="./privacy.html">プライバシーポリシー</a>
        <a href="./about.html">お問い合わせ</a>
      </div>
    </footer>
  </main>
</body>
</html>
