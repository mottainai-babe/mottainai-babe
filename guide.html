<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ガイド | Mottainai Babe</title>
  <meta name="description" content="Mottainai Babeのガイド一覧。安全、エコ、リユースの基本をわかりやすくまとめています。" />

  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5865479939175622"
    crossorigin="anonymous"></script>

  <style>
    :root{
      --bg:#0f3b34;
      --paper:#ffffff;
      --ink:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --soft:#f5f7f7;
      --accent:#16a34a;
      --radius:18px;
      --shadow: 0 10px 30px rgba(0,0,0,.10);
      --w: 820px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", "Segoe UI", Roboto, Arial;
      color:var(--ink);
      background:
        radial-gradient(1200px 600px at 20% 0%, rgba(22,163,74,.22), transparent 55%),
        radial-gradient(900px 500px at 100% 10%, rgba(245,158,11,.18), transparent 55%),
        linear-gradient(180deg, #0b2c27 0%, #0f3b34 38%, #f3f4f6 38%, #f3f4f6 100%);
      min-height:100vh;
    }

    a{color:inherit;text-decoration:none}

    /* ===== Premium Header ===== */
    .topbar{
      position:sticky; top:0;
      z-index:10;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(11,44,39,.58);
      border-bottom: 1px solid rgba(255,255,255,.12);
    }
    .topbar .inner{
      max-width: var(--w);
      margin: 0 auto;
      padding: 14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      color:#fff;
    }
    .brand{
      display:flex;
      align-items:center;
    }
    .logoWrap{
      display:flex;
      align-items:center;
      gap:12px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      transition: .2s ease;
    }
    .logoWrap:hover{
      background: rgba(255,255,255,.12);
      transform: translateY(-1px);
    }
    .logoImg{
      height: 36px;
      width: auto;
      display:block;
    }
    .brandText{
      display:flex;
      flex-direction:column;
      line-height:1.1;
      gap:2px;
    }
    .brandText strong{
      font-size: 14px;
      letter-spacing: .2px;
    }
    .brandText span{
      font-size: 11px;
      color: rgba(255,255,255,.78);
    }

    .nav{
      display:flex;
      align-items:center;
      gap:8px;
    }
    .nav a{
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color:#fff;
      transition:.2s ease;
      font-size:14px;
    }
    .nav a:hover{
      background: rgba(255,255,255,.12);
      transform: translateY(-1px);
    }
    .nav a.primary{
      background: rgba(22,163,74,.22);
      border-color: rgba(22,163,74,.35);
    }
    .nav a.primary:hover{
      background: rgba(22,163,74,.32);
    }

    /* ===== Layout ===== */
    .wrap{
      max-width: var(--w);
      margin: 0 auto;
      padding: 26px 18px 56px;
    }
    .hero{color:#fff;padding: 18px 0 12px}
    .kicker{
      display:inline-flex;
      font-size:12px;
      opacity:.92;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.16);
      padding: 6px 10px;
      border-radius: 999px;
    }
    h1{
      margin: 14px 0 10px;
      font-size: 30px;
      line-height: 1.2;
    }
    .lead{
      margin:0;
      max-width: 70ch;
      color: rgba(255,255,255,.88);
      line-height:1.7;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:16px;
      margin-top: 18px;
    }
    @media (max-width: 860px){
      .grid{grid-template-columns:1fr}
    }

    .card{
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .card .hd{
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .card .hd h2{
      margin:0;
      font-size:16px;
    }
    .pill{
      font-size:12px;
      color: var(--muted);
      padding: 6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
    }
    .card .bd{
      padding: 16px 18px;
      line-height:1.8;
    }
    .actions{
      margin-top:auto;
      padding: 14px 18px 18px;
      display:flex;
      justify-content:flex-end;
    }
    .btn{
      padding: 10px 14px;
      border-radius:999px;
      border:1px solid var(--line);
      background: var(--soft);
    }
    .btn:hover{
      filter:brightness(.98);
    }

    .footer{
      margin-top: 24px;
      text-align:center;
      font-size:12px;
      color: rgba(17,24,39,.85);
    }
    .footer .links{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:8px;
    }
  </style>
</head>

<body>

<header class="topbar">
  <div class="inner">
    <a class="brand" href="./index.html">
      <div class="logoWrap">
        <img class="logoImg" src="./logo1.png" alt="Mottainai Babe">
        <div class="brandText">
          <strong>Mottainai Babe</strong>
          <span>リユースでつなぐ、やさしい循環</span>
        </div>
      </div>
    </a>
    <nav class="nav">
      <a class="primary" href="./app.html">アプリ</a>
      <a href="./about.html">お問い合わせ</a>
    </nav>
  </div>
</header>

<main class="wrap">
  <section class="hero">
    <span class="kicker">Guides • 読みもの</span>
    <h1>ガイド一覧</h1>
    <p class="lead">
      安全に、気持ちよく、長く使うためのヒントをまとめました。
    </p>
  </section>

  <section class="grid">
    <article class="card">
      <div class="hd">
        <h2>安全ガイド</h2>
        <span class="pill">Safety</span>
      </div>
      <div class="bd">
        リユースでも「安全が最優先」。危険サイン、受け渡し時の確認、カテゴリ別の注意点を整理しています。
      </div>
      <div class="actions">
        <a class="btn" href="./safety.html">読む →</a>
      </div>
    </article>

    <article class="card">
      <div class="hd">
        <h2>エコの考え方</h2>
        <span class="pill">Eco</span>
      </div>
      <div class="bd">
        “捨てない”選択が、家計にも地球にもやさしい。循環を作るコツと、やさしい取引マナーをまとめました。
      </div>
      <div class="actions">
        <a class="btn" href="./eco.html">読む →</a>
      </div>
    </article>
  </section>

  <footer class="footer">
    <div>© 2026 Mottainai Babe. All rights reserved.</div>
    <div class="links">
      <a href="./terms.html">利用規約</a>
      <a href="./privacy.html">プライバシーポリシー</a>
      <a href="./about.html">お問い合わせ</a>
    </div>
  </footer>
</main>

</body>
</html>
